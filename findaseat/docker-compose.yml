networks:
  rede_database:

volumes:
  pg_database_findaseat:
services:

  findaseat-database:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    volumes:
      - pg_database_findaseat:/var/lib/postgresql/data
      - type: tmpfs
        target: /dev/shm
        tmpfs:
          size: 134217728 # 128*2^20 bytes = 128Mb
      - ./scripts:/scripts
      - ./scripts/start.sh:/docker-entrypoint-initdb.d/start.sh
    networks:
      - rede_database
    environment:
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_USER: usergabs
      POSTGRES_DB: findaASeatDB

  pg-admin-findaseat:
    image: dpage/pgadmin4
    ports:
      - "15432:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "gabrihell@hotmail.com"
      PGADMIN_DEFAULT_PASSWORD: "mysecretpassword"
    networks:
      - rede_database